<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="135" height="40" viewBox="0 0 135 40">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099ff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9500;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6d00;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff1744;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d50000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="playGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffc107;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff8f00;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rectangle -->
  <rect width="135" height="40" rx="8" ry="8" fill="url(#gradient)" stroke="#a6a6a6" stroke-width="0.5"/>

  <!-- Google Play icon -->
  <g transform="translate(8, 8)">
    <!-- Play Store triangle parts -->
    <path d="M4.5 3.5L16.5 12L4.5 20.5z" fill="url(#playGradient1)" opacity="0.9"/>
    <path d="M4.5 3.5L12.5 7L16.5 12L4.5 3.5z" fill="url(#playGradient2)" opacity="0.9"/>
    <path d="M12.5 17L4.5 20.5L16.5 12L12.5 17z" fill="url(#playGradient3)" opacity="0.9"/>
    <path d="M4.5 3.5L4.5 20.5L12.5 7L12.5 17z" fill="url(#playGradient4)" opacity="0.9"/>
  </g>

  <!-- Text "EM BREVE NA" -->
  <text x="30" y="13" font-family="Roboto, sans-serif" font-size="7" fill="#FFF" font-weight="400">
    EM BREVE NA
  </text>

  <!-- Text "Google Play" -->
  <text x="30" y="28" font-family="Roboto, sans-serif" font-size="13" fill="#FFF" font-weight="500">
    Google Play
  </text>
</svg>